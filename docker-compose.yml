services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: news_fetch_scheduler
    environment:
      - PYTHONPATH=src
      - VAULT_ADDR=http://vault-server:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_SECRET_PATH=secret/NEWS_SUMMARY_APP
    networks:
      - vault-network
      - infra-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pgrep -f 'python.*main.py' > /dev/null" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
networks:
  vault-network:
    external: true
  infra-network:
    external: true