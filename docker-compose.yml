services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: news_fetch_scheduler
    environment:
      - PYTHONPATH=src
      - VAULT_ADDR=http://vault-server:8200
      - VAULT_TOKEN=${VAULT_TOKEN}
      - VAULT_SECRET_PATH=secret/NEWS_SUMMARY_APP
    networks:
      - vault-network
      - infra-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "cat /proc/1/status | grep -q 'State:.*running\\|State:.*sleeping' || exit 1" ]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
networks:
  vault-network:
    external: true
  infra-network:
    external: true